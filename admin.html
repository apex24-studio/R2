<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMA Admin | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            padding: 20px;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-container {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .device-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--glass-bg);
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .device-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        .btn-success { background: rgba(0, 230, 118, 0.2); color: var(--success); border: 1px solid var(--success); }
        .btn-danger { background: rgba(255, 23, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        
        .btn-success:hover { background: var(--success); color: #000; }
        .btn-danger:hover { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="admin-header">
        <a href="index.html" class="logo">R<span>O</span>MA <span>ADMIN</span></a>
        <a href="index.html" class="btn btn-primary btn-small">العودة للموقع</a>
    </div>

    <div class="admin-container">
        <h2>إدارة الأجهزة (نسخة تجريبية)</h2>
        <p class="text-muted" style="margin-bottom: 30px;">قم بتغيير حالة الأجهزة من هنا، وستتحدث في الصفحة الرئيسية تلقائياً.</p>

        <div id="admin-devices-list">
            <!-- Injected via JS -->
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        // Simple password protection simulation
        document.addEventListener('DOMContentLoaded', () => {
            const password = prompt("الرجاء إدخال كلمة المرور (للتجربة: 1234)");
            if (password !== "1234") {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top: 50px; color: red;'>عذراً، كلمة المرور غير صحيحة ولا يمكنك الدخول.</h2>";
                return;
            }
            window.isAdminAuthenticated = true;
            if (typeof window.renderAdminConsoles === 'function') {
                window.renderAdminConsoles();
            }
        });
    </script>
</body>
</html>
